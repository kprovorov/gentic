name: gentic
arch: "${ARCH}" # amd64 / arm64, set per matrix leg by the release workflow
platform: linux
version: "${VERSION}"
maintainer: "Kirill Provorov <kirill@provorov.dev>"
description: "Gentic agent: runs Claude Code or Codex over ACP for queued issues"
homepage: "https://github.com/kprovorov/gentic"
license: "MIT"
contents:
  - src: dist/${TARGET}/gentic
    dst: /usr/bin/gentic
    expand: true
  # /usr/bin/gentic and /usr/lib/gentic/vendor are not siblings the way a
  # tar.gz extraction or a Homebrew keg would be, so src/session.ts checks
  # this fixed path as a fallback (DEB_VENDOR_ROOT) when it isn't found next
  # to the running executable.
  - src: dist/${TARGET}/vendor/claude-agent-acp
    dst: /usr/lib/gentic/vendor/claude-agent-acp
    type: tree
    expand: true
  - src: dist/${TARGET}/vendor/codex-acp
    dst: /usr/lib/gentic/vendor/codex-acp
    type: tree
    expand: true
scripts:
  postinstall: ./scripts/deb-postinstall.sh
