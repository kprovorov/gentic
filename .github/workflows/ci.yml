name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Disable placeholder local Clerk auth
        run: >-
          perl -0pi -e
          's/\[auth\.third_party\.clerk\]\nenabled = true/[auth.third_party.clerk]\nenabled = false/'
          supabase/config.toml

      - name: Start Supabase
        run: pnpm dlx supabase@2.109.1 start

      - name: Verify generated Supabase types
        run: pnpm db:types:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm --filter @gentic/gentic test
